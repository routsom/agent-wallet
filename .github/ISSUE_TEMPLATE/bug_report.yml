name: Bug Report
description: Something is broken in agent-wallet
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        wallet = AgentWallet(daily_limit_usd=5.00)
        client = wallet.wrap(Anthropic())
        # ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options: [Anthropic, OpenAI, Google Gemini, Ollama, N/A]
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: agent-wallet version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11"
    validations:
      required: true
