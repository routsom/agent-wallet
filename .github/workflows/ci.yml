name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check agent_wallet/

      - name: Type check (mypy)
        run: mypy agent_wallet/ --strict

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=agent_wallet --cov-report=term-missing

      - name: Coverage gate (80%)
        run: pytest tests/ --cov=agent_wallet --cov-fail-under=80 -q
